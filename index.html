<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flip Clock">
<title>Flip Clock</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  -webkit-tap-highlight-color: transparent;
  user-select: none; -webkit-user-select: none;
  touch-action: manipulation;
}

body { background: var(--bg); transition: background 0.4s; }
body.white {
  --bg: #f8f8f8; --card: #e8e8e8;
  --shadow: rgba(0,0,0,0.18); --line: rgba(0,0,0,0.12);
  --text: #111; --btn-bg: rgba(0,0,0,0.10);
}
body.black {
  --bg: #0c0c0c; --card: #1a1a1a;
  --shadow: rgba(0,0,0,0.60); --line: rgba(255,255,255,0.07);
  --text: #f0f0f0; --btn-bg: rgba(255,255,255,0.10);
}

.theme-btn {
  position: fixed; top: max(18px, env(safe-area-inset-top, 18px)); right: 20px;
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--btn-bg); border: none; cursor: pointer;
  font-size: 19px; display: flex; align-items: center; justify-content: center;
  z-index: 200; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); color: var(--text);
}
.theme-btn:active { transform: scale(0.92); }

.orient-btn {
  position: fixed; bottom: max(18px, env(safe-area-inset-bottom, 18px)); right: 20px;
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--btn-bg); border: none; cursor: pointer;
  font-size: 19px; display: flex; align-items: center; justify-content: center;
  z-index: 200; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); color: var(--text);
}
.orient-btn:active { transform: scale(0.92); }

/* ── 전체 래퍼 ── */
.clock-wrap {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
}

/* 가로: 90도 회전 + 뷰포트 치환 */
.clock-wrap.landscape {
  transform: rotate(90deg);
  width: 100vh; height: 100vw;
  top: calc(50% - 50vw);
  left: calc(50% - 50vh);
}

/* ============================================
   세로 모드 (기본): 3행 세로 배치
   ============================================ */
.clock {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  justify-content: center;
  gap: clamp(8px, 2.5vw, 16px);
  width: min(72vw, 340px);
}

.group {
  display: flex;
  flex-direction: row;
  gap: clamp(4px, 1vw, 8px);
  width: 100%;
}

.sep {
  display: none;           /* 세로: 콜론 숨김 */
  color: var(--text);
  font-weight: 900;
  line-height: 1;
  flex-shrink: 0;
  align-self: center;
  opacity: 0.3;
  transition: color 0.4s;
}

.flip-unit {
  flex: 1;
  position: relative;
  aspect-ratio: 1 / 1.3;   /* 높이 자동 계산 */
  perspective: 900px;
  --card-r: min(3vw, 14px);
  --font-sz: min(21vw, 76px);
}

/* ============================================
   가로 모드 (landscape): 1행 가로 배치
   회전 후 vw↔vh 뒤바뀜
   ============================================ */
.clock-wrap.landscape .clock {
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 0;
  width: auto;
}

.clock-wrap.landscape .group {
  gap: clamp(3px, 0.8vh, 6px);
  width: auto;
  flex-shrink: 0;
}

.clock-wrap.landscape .sep {
  display: block;
  font-size: min(8vh, 36px);
  padding: 0 min(2vh, 10px);
  padding-bottom: 0.06em;
}

.clock-wrap.landscape .flip-unit {
  flex: none;
  width: min(13vh, 80px);
  aspect-ratio: 1 / 1.3;
  --card-r: min(1.5vh, 8px);
  --font-sz: min(10vh, 67px);
}

/* ── 카드 반쪽 ── */
.half {
  position: absolute; left: 0; right: 0; height: 50%;
  background: var(--card); overflow: hidden;
  box-shadow: 0 4px 20px var(--shadow); transition: background 0.4s;
}
.half.top    { top: 0;    border-radius: var(--card-r) var(--card-r) 0 0; }
.half.bottom { bottom: 0; border-radius: 0 0 var(--card-r) var(--card-r); }
.half.top::after {
  content: ''; position: absolute;
  bottom: 0; left: 0; right: 0; height: 2px; background: var(--line);
}

.num-wrap {
  position: absolute; left: 0; right: 0; height: 200%;
  display: flex; align-items: center; justify-content: center;
}
.half.top .num-wrap    { top: 0; }
.half.bottom .num-wrap { bottom: 0; }

.num-wrap span {
  font-size: var(--font-sz);
  font-weight: 800; color: var(--text);
  line-height: 1; display: block;
  letter-spacing: -0.03em;
  font-variant-numeric: tabular-nums;
  transition: color 0.4s;
}

/* ── 플랩 ── */
.flap {
  position: absolute; left: 0; right: 0; height: 50%;
  background: var(--card); overflow: hidden;
  transition: background 0.4s; z-index: 3;
}
.flap.flap-top {
  top: 0; border-radius: var(--card-r) var(--card-r) 0 0;
  transform-origin: bottom center;
}
.flap.flap-top::after {
  content: ''; position: absolute;
  bottom: 0; left: 0; right: 0; height: 2px; background: var(--line);
}
.flap.flap-bottom {
  bottom: 0; border-radius: 0 0 var(--card-r) var(--card-r);
  transform-origin: top center; visibility: hidden;
}
.flap .num-wrap { position: absolute; left: 0; right: 0; height: 200%; }
.flap.flap-top .num-wrap    { top: 0; }
.flap.flap-bottom .num-wrap { bottom: 0; }

@keyframes fold-down { from { transform: rotateX(0deg); } to { transform: rotateX(-90deg); } }
@keyframes fold-up   { from { transform: rotateX(90deg); } to { transform: rotateX(0deg); } }
.flap.flap-top.go    { animation: fold-down 0.23s ease-in  forwards; }
.flap.flap-bottom.go { visibility: visible; animation: fold-up 0.23s ease-out forwards; }
</style>
</head>
<body class="white">

<button class="theme-btn" onclick="toggleTheme()">◐</button>
<button class="orient-btn" onclick="toggleOrientation()">↔</button>

<div class="clock-wrap" id="clockWrap">
  <div class="clock">
    <div class="group">
      <div class="flip-unit" id="d0"></div>
      <div class="flip-unit" id="d1"></div>
    </div>
    <div class="sep">:</div>
    <div class="group">
      <div class="flip-unit" id="d2"></div>
      <div class="flip-unit" id="d3"></div>
    </div>
    <div class="sep">:</div>
    <div class="group">
      <div class="flip-unit" id="d4"></div>
      <div class="flip-unit" id="d5"></div>
    </div>
  </div>
</div>

<script>
const THEME_KEY  = 'flip-clock-theme';
const ORIENT_KEY = 'flip-clock-landscape';

function buildUnit(el) {
  el.innerHTML = `
    <div class="half top"><div class="num-wrap"><span>0</span></div></div>
    <div class="half bottom"><div class="num-wrap"><span>0</span></div></div>
    <div class="flap flap-top"><div class="num-wrap"><span>0</span></div></div>
    <div class="flap flap-bottom"><div class="num-wrap"><span>0</span></div></div>
  `;
  el._val       = -1;
  el._topSpan   = el.querySelector('.half.top span');
  el._botSpan   = el.querySelector('.half.bottom span');
  el._flapTop   = el.querySelector('.flap.flap-top');
  el._flapBot   = el.querySelector('.flap.flap-bottom');
  el._flapTopSp = el.querySelector('.flap.flap-top span');
  el._flapBotSp = el.querySelector('.flap.flap-bottom span');
}

const units = ['d0','d1','d2','d3','d4','d5'].map(id => {
  const el = document.getElementById(id);
  buildUnit(el);
  return el;
});

function setDigit(el, n) {
  if (el._val === n) return;
  const s = String(n);
  if (el._val < 0) {
    el._topSpan.textContent = s;
    el._botSpan.textContent = s;
    el._flapTopSp.textContent = s;
    el._val = n; return;
  }
  const old = String(el._val);
  el._val = n;
  el._flapTopSp.textContent = old;
  el._flapBotSp.textContent = s;
  el._topSpan.textContent = s;
  el._flapTop.classList.remove('go');
  void el._flapTop.offsetWidth;
  el._flapTop.classList.add('go');
  setTimeout(() => {
    el._botSpan.textContent = s;
    el._flapBot.classList.remove('go');
    void el._flapBot.offsetWidth;
    el._flapBot.classList.add('go');
  }, 115);
  setTimeout(() => {
    el._flapTopSp.textContent = s;
    el._flapTop.classList.remove('go');
    el._flapBot.classList.remove('go');
  }, 375);
}

function tick() {
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
  setDigit(units[0], Math.floor(h/10)); setDigit(units[1], h%10);
  setDigit(units[2], Math.floor(m/10)); setDigit(units[3], m%10);
  setDigit(units[4], Math.floor(s/10)); setDigit(units[5], s%10);
}

function toggleTheme() {
  const isWhite = document.body.classList.contains('white');
  document.body.classList.toggle('white', !isWhite);
  document.body.classList.toggle('black', isWhite);
  localStorage.setItem(THEME_KEY, isWhite ? 'black' : 'white');
}
const savedTheme = localStorage.getItem(THEME_KEY);
if (savedTheme) { document.body.classList.remove('white','black'); document.body.classList.add(savedTheme); }

let isLandscape = false;
const wrap = document.getElementById('clockWrap');
function applyOrientation() {
  wrap.classList.toggle('landscape', isLandscape);
  localStorage.setItem(ORIENT_KEY, isLandscape ? '1' : '0');
}
function toggleOrientation() {
  isLandscape = !isLandscape;
  applyOrientation();
}
if (localStorage.getItem(ORIENT_KEY) === '1') { isLandscape = true; applyOrientation(); }

tick();
setTimeout(() => { tick(); setInterval(tick, 1000); }, 1000 - new Date().getMilliseconds());
</script>
</body>
</html>
